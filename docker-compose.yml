services:
  postgres:
    image: postgres:16-alpine
    container_name: gamex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gamex
      POSTGRES_PASSWORD: gamex123
      POSTGRES_DB: gamex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gamex -d gamex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamex-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://gamex:gamex123@postgres:5432/gamex_db?schema=public
      JWT_SECRET: ${JWT_SECRET:-gamex-super-secret-jwt-key-change-in-production-min-32-chars}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_NOTIFICATION_URL: http://backend:4000/api/v1/payments/webhook
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Gamex Import <noreply@gameximport.com>}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gameximport.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: gamex-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    depends_on:
      - backend

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamex-seed
    environment:
      DATABASE_URL: postgresql://gamex:gamex123@postgres:5432/gamex_db?schema=public
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gameximport.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    profiles:
      - seed

volumes:
  postgres_data:
  backend_logs:
