services:
  - type: web
    name: gamex-backend
    runtime: node
    repo: https://github.com/VivanDg/Comercio-Electronico-GAMEX
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: gamex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_COOKIE_NAME
        value: gamex_token
      - key: FRONTEND_URL
        value: https://gamex-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://gamex-frontend.onrender.com
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_NOTIFICATION_URL
        value: https://gamex-backend.onrender.com/api/v1/payments/webhook
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: Gamex Import <noreply@gameximport.com>
      - key: ADMIN_EMAIL
        value: admin@gameximport.com
      - key: ADMIN_PASSWORD
        value: Admin123!

  - type: web
    name: gamex-frontend
    runtime: node
    repo: https://github.com/VivanDg/Comercio-Electronico-GAMEX
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://gamex-backend.onrender.com/api/v1

databases:
  - name: gamex-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
